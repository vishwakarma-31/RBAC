version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: rbac-mongodb
    env_file:
      - .env
    environment:
      - MONGO_INITDB_DATABASE=${MONGODB_DATABASE}
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - ./infrastructure/database/mongo-seed:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rbac-network

  redis:
    image: redis:7-alpine
    container_name: rbac-redis
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - rbac-network

  authz-engine:
    build:
      context: ./services/authz-engine
      dockerfile: Dockerfile
    container_name: rbac-authz-engine
    env_file:
      - .env
    environment:
      - NODE_ENV=${NODE_ENV}
      - MONGODB_ATLAS_URI=mongodb://mongodb:27017/${MONGODB_DATABASE}
      - MONGODB_DATABASE=${MONGODB_DATABASE}
      - REDIS_URL=${REDIS_URL}
      - JWT_SECRET=${JWT_SECRET}
      - LOG_LEVEL=${LOG_LEVEL}
    ports:
      - "3000:3000"
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - rbac-network

  management-api:
    build:
      context: ./services/management-api
      dockerfile: Dockerfile
    container_name: rbac-management-api
    env_file:
      - .env
    environment:
      - NODE_ENV=${NODE_ENV}
      - MONGODB_ATLAS_URI=mongodb://mongodb:27017/${MONGODB_DATABASE}
      - MONGODB_DATABASE=${MONGODB_DATABASE}
      - REDIS_URL=${REDIS_URL}
      - AUTHZ_ENGINE_URL=${AUTHZ_ENGINE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - LOG_LEVEL=${LOG_LEVEL}
    ports:
      - "3001:3001"
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      authz-engine:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - rbac-network

  audit-service:
    build:
      context: ./services/audit-service
      dockerfile: Dockerfile
    container_name: rbac-audit-service
    env_file:
      - .env
    environment:
      - NODE_ENV=${NODE_ENV}
      - MONGODB_ATLAS_URI=mongodb://mongodb:27017/${MONGODB_DATABASE}
      - MONGODB_DATABASE=${MONGODB_DATABASE}
      - REDIS_URL=${REDIS_URL}
      - JWT_SECRET=${JWT_SECRET}
      - LOG_LEVEL=${LOG_LEVEL}
    ports:
      - "3002:3002"
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - rbac-network

  admin-dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: rbac-admin-dashboard
    environment:
      - REACT_APP_API_BASE_URL=http://localhost:3001
      - REACT_APP_AUTHZ_ENGINE_URL=http://localhost:3000
    ports:
      - "3003:80"
    depends_on:
      management-api:
        condition: service_healthy
      authz-engine:
        condition: service_healthy
    networks:
      - rbac-network

networks:
  rbac-network:
    driver: bridge

volumes:
  mongodb_data:
  redis_data: