version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: rbac-mongodb
    env_file:
      - .env
    environment:
      - MONGO_INITDB_DATABASE=${MONGODB_DATABASE}
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - ./infrastructure/database/mongo-seed:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rbac-network

  redis:
    image: redis:7-alpine
    container_name: rbac-redis
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - rbac-network

  postgres:
    image: postgres:15-alpine
    container_name: rbac-postgres
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rbac-network

  db-migrator:
    image: node:20-alpine
    container_name: rbac-db-migrator
    working_dir: /app
    volumes:
      - ./infrastructure/database:/app
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - SEED_DATABASE=true
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "npm install && npx node-pg-migrate up && node scripts/seed.js"
    networks:
      - rbac-network

  authz-engine:
    build:
      context: .
      dockerfile: services/authz-engine/Dockerfile
    container_name: rbac-authz-engine
    env_file:
      - .env
    environment:
      - NODE_ENV=${NODE_ENV}
      - MONGODB_ATLAS_URI=mongodb://mongodb:27017/${MONGODB_DATABASE}
      - MONGODB_DATABASE=${MONGODB_DATABASE}
      - REDIS_URL=${REDIS_URL}
      - JWT_SECRET=${JWT_SECRET}
      - LOG_LEVEL=${LOG_LEVEL}
    ports:
      - "3000:3000"
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - rbac-network

  management-api:
    build:
      context: .
      dockerfile: services/management-api/Dockerfile
    container_name: rbac-management-api
    env_file:
      - .env
    environment:
      - NODE_ENV=${NODE_ENV}
      - DATABASE_URL=${DATABASE_URL}
      - MONGODB_ATLAS_URI=mongodb://mongodb:27017/${MONGODB_DATABASE}
      - MONGODB_DATABASE=${MONGODB_DATABASE}
      - REDIS_URL=${REDIS_URL}
      - AUTHZ_ENGINE_URL=${AUTHZ_ENGINE_URL}
      - JWT_SECRET=${JWT_SECRET}
      - LOG_LEVEL=${LOG_LEVEL}
    ports:
      - "3001:3001"
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      db-migrator:
        condition: service_completed_successfully
      authz-engine:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - rbac-network

  audit-service:
    build:
      context: .
      dockerfile: services/audit-service/Dockerfile
    container_name: rbac-audit-service
    env_file:
      - .env
    environment:
      - NODE_ENV=${NODE_ENV}
      - DATABASE_URL=${DATABASE_URL}
      - MONGODB_ATLAS_URI=mongodb://mongodb:27017/${MONGODB_DATABASE}
      - MONGODB_DATABASE=${MONGODB_DATABASE}
      - REDIS_URL=${REDIS_URL}
      - JWT_SECRET=${JWT_SECRET}
      - LOG_LEVEL=${LOG_LEVEL}
    ports:
      - "3002:3002"
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      db-migrator:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - rbac-network

  admin-dashboard:
    build:
      context: .
      dockerfile: dashboard/Dockerfile
    container_name: rbac-admin-dashboard
    environment:
      - REACT_APP_API_BASE_URL=http://localhost:3001/api/v1
      - REACT_APP_AUTHZ_ENGINE_URL=http://localhost:3000
    ports:
      - "3003:80"
    depends_on:
      management-api:
        condition: service_healthy
      authz-engine:
        condition: service_healthy
    networks:
      - rbac-network

  anomaly-detector:
    build:
      context: .
      dockerfile: services/anomaly-detector/Dockerfile
    container_name: rbac-anomaly-detector
    environment:
      - MONGODB_URI=mongodb://mongodb:27017
      - REDIS_URL=redis://redis:6379
      - MODEL_PATH=models/anomaly_detector.joblib
    ports:
      - "8000:8000"
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - rbac-network

networks:
  rbac-network:
    driver: bridge

volumes:
  mongodb_data:
  redis_data:
  postgres_data: